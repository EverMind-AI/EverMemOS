# EverMemOS System Configuration

name: "evermemos"
version: "1.0"
description: "EverMemOS"

adapter: "evermemos"

# LLM configuration
llm:
  provider: "openai"
  model: "openai/gpt-4.1-mini"
  api_key: "${LLM_API_KEY}"
  base_url: "${LLM_BASE_URL:https://openrouter.ai/api/v1}"

search:
  mode: "agentic"  # agentic (default, 93% on LoCoMo) | lightweight (BM25-only, fastest)

# Dataset-specific overrides
dataset_overrides:
  personamemv2:
    add:
      enable_profile_extraction: true
      enable_clustering: true
      profile_extraction_mode: "scene"
      profile_scenario: "assistant"
      profile_min_confidence: 0.6
      profile_min_memcells: 1
      profile_life_max_items: 25
    answer:
      use_profile_in_answer: true
      use_profile_classifier: true

